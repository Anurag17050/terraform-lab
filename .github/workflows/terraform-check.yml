name: Terraform Check

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Run Terraform on all folders
        run: |
          for dir in day1 day2 day3 day4 bonus; do
            echo "Checking $dir"

            if [ -d "$dir" ] && ls $dir/*.tf >/dev/null 2>&1; then
              cd $dir

              terraform init
              terraform fmt -check
              terraform validate
              terraform plan -input=false || echo "Plan failed, skipping"

              cd ..
            else
              echo "Skipping $dir (no .tf files)"
            fi
          done
