name: Terraform Check

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Run Terraform on all folders
        run: |
          for dir in day1 day2 day3 day4 bonus; do
            echo "Running Terraform in $dir"
            cd $dir

            terraform init
            terraform fmt -check
            terraform validate
            terraform plan

            cd ..
          done
